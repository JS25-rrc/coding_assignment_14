name: CI - Code Quality Checks

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  code-quality:
    name: Prettier, ESLint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npx prettier --check "src/**/*.{ts,tsx,css,json}"
      - run: npx eslint "src/**/*.{ts,tsx}" --max-warnings=0
      - run: npm test
      - run: npm run build
